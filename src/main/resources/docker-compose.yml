version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: sprint-postgres
    environment:
      POSTGRES_DB: sprint
      POSTGRES_USER: sprint
      POSTGRES_PASSWORD: sprint
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprint -d sprint"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: ../../..
      dockerfile: Dockerfile
    container_name: sprint-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sprint
      SPRING_DATASOURCE_USERNAME: sprint
      SPRING_DATASOURCE_PASSWORD: sprint
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/sprint
      SPRING_FLYWAY_USER: sprint
      SPRING_FLYWAY_PASSWORD: sprint
      APP_JIRA_BASE_URL: https://your-domain.atlassian.net
      APP_JIRA_USERNAME: jira-user@example.com
      APP_JIRA_API_TOKEN: replace-me
      APP_OPENAI_API_KEY: replace-me
    ports:
      - "8080:8080"

volumes:
  postgres-data:
